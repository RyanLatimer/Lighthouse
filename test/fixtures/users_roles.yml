# HABTM join table for Rolify (users <-> roles)
# Since users_roles has no model, we must use raw column names with fixture IDs.
admin_user_admin_role:
  user_id: <%= ActiveRecord::FixtureSet.identify(:admin_user) %>
  role_id: <%= ActiveRecord::FixtureSet.identify(:admin_role) %>

lead_user_lead_role:
  user_id: <%= ActiveRecord::FixtureSet.identify(:lead_user) %>
  role_id: <%= ActiveRecord::FixtureSet.identify(:lead_role) %>

scout_user_scout_role:
  user_id: <%= ActiveRecord::FixtureSet.identify(:scout_user) %>
  role_id: <%= ActiveRecord::FixtureSet.identify(:scout_role) %>
