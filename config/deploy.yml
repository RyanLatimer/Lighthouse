# Kamal deployment configuration (not currently used).
# Lighthouse is deployed via Docker Compose on a Raspberry Pi.
# See docker-compose.prod.yml and bin/deploy for the active deployment setup.
#
# To switch to Kamal in the future, update the placeholders below and run:
#   kamal setup
#
service: lighthouse
image: ghcr.io/ryanlatimer/lighthouse

servers:
  web:
    - YOUR_PI_TAILSCALE_IP

proxy:
  ssl: true
  host: lighthouse.frc7790.com

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - LIGHTHOUSE_DATABASE_PASSWORD
    - TBA_API_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: lighthouse-db
    RAILS_LOG_LEVEL: info
    RAILS_SERVE_STATIC_FILES: true
    WEB_CONCURRENCY: 2
    RAILS_MAX_THREADS: 3

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "lighthouse_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: arm64

accessories:
  db:
    image: postgres:17
    host: YOUR_PI_TAILSCALE_IP
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_DB: lighthouse_production
        POSTGRES_USER: lighthouse
      secret:
        - LIGHTHOUSE_DATABASE_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
